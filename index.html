<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF to Slides PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  :root {
    --primary-color: #00c6ff;
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-light: #f8fafc;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-light);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; 
  }

  /* 📱 Header Style */
  header {
    background: #0b1120;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    border-bottom: 2px solid var(--primary-color);
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    z-index: 10;
  }

  /* 📜 Main Scrollable Content */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 80px; 
  }

  /* 🎛️ Controls Section */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
    background: var(--bg-card);
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .file-upload-wrapper {
    position: relative;
    overflow: hidden;
    display: inline-block;
    width: 100%;
  }
  
  .file-upload-wrapper input[type="file"] {
    font-size: 100px;
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0;
    cursor: pointer;
    height: 100%;
  }

  .btn-upload {
    background: transparent;
    border: 2px dashed var(--primary-color);
    color: var(--primary-color);
    padding: 12px;
    border-radius: 8px;
    width: 100%;
    text-align: center;
    font-weight: bold;
    transition: all 0.3s;
  }

  .file-name {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    margin-top: -5px;
  }

  .btn-action {
    background: var(--primary-color);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .btn-action:active {
    transform: scale(0.95);
  }

  .btn-action:disabled {
    background: #475569;
    color: #94a3b8;
  }

  /* 🖼️ Slides Grid */
  .slides {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }

  .slideBox {
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    border: 1px solid #334155;
  }

  .slideBox img {
    width: 100%;
    height: 120px;
    object-fit: contain; 
    background: #000;
    padding: 5px;
  }

  .slideNumber {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0, 0, 0, 0.7);
    color: var(--primary-color);
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: bold;
  }

  .downloadBtn {
    background: transparent;
    color: var(--primary-color);
    border: none;
    border-top: 1px solid #334155;
    padding: 10px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: background 0.3s;
  }

  /* 🦶 Footer Style */
  footer {
    background: #0b1120;
    padding: 10px;
    text-align: center;
    border-top: 1px solid #334155;
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
  }

  .btn-footer {
    background: #00c6ff;
    color: #000;
    font-weight: bold;
    border: none;
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 15px;
    width: 90%;
    cursor: pointer;
  }

  .btn-footer:disabled {
    background: #475569;
    color: #94a3b8;
  }

  #loader {
    display: none;
    text-align: center;
    margin: 20px 0;
    color: var(--primary-color);
    font-weight: bold;
  }
</style>
</head>

<body>

  <header>
    📄 PDF to Slides PRO
  </header>

  <main>
    <div class="controls">
      <div class="file-upload-wrapper">
        <div class="btn-upload">📂 Select PDF File</div>
        <input type="file" id="pdfInput" accept="application/pdf" onchange="showFileName()">
      </div>
      <div id="fileNameDisplay" class="file-name">No file selected</div>
      
      <button id="loadBtn" class="btn-action" onclick="loadPDF()">⏳ Load Slides</button>
    </div>

    <div id="loader">Processing PDF, please wait... ⚙️</div>

    <div id="slidesContainer" class="slides"></div>
  </main>

  <footer>
    <button id="downloadAllBtn" class="btn-footer" onclick="downloadAllZip()">📥 Download Folder (ZIP)</button>
  </footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let slides = [];

function showFileName() {
  const file = document.getElementById("pdfInput").files[0];
  const display = document.getElementById("fileNameDisplay");
  if (file) {
    display.innerText = file.name;
  } else {
    display.innerText = "No file selected";
  }
}

async function loadPDF() {
  const file = document.getElementById("pdfInput").files[0];
  if (!file) {
    alert("Please select a PDF file first!");
    return;
  }

  const loadBtn = document.getElementById("loadBtn");
  const loader = document.getElementById("loader");
  const container = document.getElementById("slidesContainer");

  loadBtn.disabled = true;
  loader.style.display = "block";
  container.innerHTML = "";
  slides = [];

  try {
    const pdfData = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({scale: 2}); 

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      await page.render({canvasContext: ctx, viewport}).promise;

      const imgData = canvas.toDataURL("image/png");
      const paddedNum = String(i).padStart(2, '0');
      
      slides.push({ data: imgData, num: paddedNum });

      createSlideCard(imgData, paddedNum, container);
    }
  } catch (error) {
    alert("Error loading PDF. Please try again.");
    console.error(error);
  }

  loader.style.display = "none";
  loadBtn.disabled = false;
  loadBtn.innerText = "✅ Loaded Successfully";
  setTimeout(() => loadBtn.innerText = "⏳ Load Slides", 3000);
}

function createSlideCard(imgData, num, container) {
  const box = document.createElement("div");
  box.className = "slideBox";

  const img = document.createElement("img");
  img.src = imgData;

  const numberLabel = document.createElement("div");
  numberLabel.className = "slideNumber";
  numberLabel.innerText = "Slide " + num;

  const btn = document.createElement("button");
  btn.className = "downloadBtn";
  btn.innerText = "⬇️ Download 1";
  btn.onclick = function() { downloadSingleImage(imgData, num); };

  box.appendChild(img);
  box.appendChild(numberLabel);
  box.appendChild(btn);

  container.appendChild(box);
}

// सिंगल इमेज डाउनलोड करने के लिए
function downloadSingleImage(dataUrl, num) {
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = `Slide_${num}.png`;
  document.body.appendChild(a); 
  a.click();
  document.body.removeChild(a);
}

// 🚀 नया फंक्शन: ज़िप फोल्डर डाउनलोड करने के लिए
async function downloadAllZip() {
  if (slides.length === 0) {
    alert("Please load a PDF first!");
    return;
  }
  
  const btn = document.getElementById("downloadAllBtn");
  btn.innerText = "⏳ Creating ZIP Folder...";
  btn.disabled = true;

  try {
    const zip = new JSZip();
    // ज़िप के अंदर एक फोल्डर बना रहे हैं
    const imgFolder = zip.folder("PDF_Slides"); 

    // सारी इमेजेज को फोल्डर में डाल रहे हैं
    slides.forEach((slide) => {
      // Base64 स्ट्रिंग से हेडर हटाना ज़रूरी है
      const base64Data = slide.data.split(',')[1];
      imgFolder.file(`Slide_${slide.num}.png`, base64Data, {base64: true});
    });

    // ज़िप फाइल जनरेट करना
    const content = await zip.generateAsync({type: "blob"});
    
    // डाउनलोड ट्रिगर करना
    const a = document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "PDF_Slides_PRO.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    btn.innerText = "✅ Download Complete";
    setTimeout(() => {
      btn.innerText = "📥 Download Folder (ZIP)";
      btn.disabled = false;
    }, 3000);

  } catch (error) {
    console.error(error);
    alert("Error creating ZIP file.");
    btn.innerText = "📥 Download Folder (ZIP)";
    btn.disabled = false;
  }
}
</script>

</body>
</html>
